<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listings | Change Realty</title>
  <style>
    :root{
      --bg:#f7f7f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --accent:#111827;
      --shadow:0 10px 30px rgba(0,0,0,.06);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-width:0;
      overflow-x:hidden;
    }

    .container{
      max-width:1400px;
      margin:0 auto;
      padding:24px 18px 40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .topbar-left{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .eyebrow{
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    h1{
      margin:0;
      font-size:34px;
      line-height:1.1;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
      max-width:760px;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:14px;
      font-weight:700;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      cursor:pointer;
    }

    .btn.primary{
      background:var(--accent);
      color:#fff;
      border:none;
    }

    .summary-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
      padding:14px 16px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow:var(--shadow);
    }

    .summary-text{
      font-size:14px;
      color:var(--muted);
    }

    .status,
    .error-box,
    .empty-box{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:22px;
      box-shadow:var(--shadow);
      font-size:15px;
      line-height:1.5;
    }

    .error-box{
      color:#991b1b;
      border-color:#fecaca;
      background:#fff7f7;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:18px;
      min-width:0;
    }

    .card-link{
      text-decoration:none;
      color:inherit;
      display:block;
      min-width:0;
    }

    .listing-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      transition:transform .15s ease, box-shadow .15s ease;
      min-width:0;
      height:100%;
      display:flex;
      flex-direction:column;
    }

    .listing-card:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 36px rgba(0,0,0,.09);
    }

    .card-photo-wrap{
      width:100%;
      aspect-ratio: 16 / 10;
      background:#e5e7eb;
      overflow:hidden;
      position:relative;
      flex:0 0 auto;
    }

    .card-photo{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      object-position:center;
    }

    .no-photo{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#6b7280;
      font-size:14px;
      text-align:center;
      padding:16px;
    }

    .card-body{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      flex:1 1 auto;
      min-width:0;
    }

    .price-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .price{
      font-size:28px;
      font-weight:800;
      line-height:1.1;
      margin:0;
    }

    .status-pill{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:7px 10px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      background:#f3f4f6;
      color:#374151;
      border:1px solid var(--border);
      white-space:nowrap;
    }

    .address{
      margin:0;
      font-size:20px;
      line-height:1.25;
      font-weight:800;
      word-break:break-word;
    }

    .location{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      word-break:break-word;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 10px;
      background:#f3f4f6;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      color:#374151;
    }

    .remarks{
      margin:0;
      color:#374151;
      font-size:14px;
      line-height:1.6;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .meta{
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding-top:8px;
      border-top:1px solid var(--border);
      font-size:13px;
      color:var(--muted);
    }

    .brokerage{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .mls{
      flex:0 0 auto;
      font-weight:700;
      color:#374151;
    }

    @media (max-width: 1100px){
      .grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px){
      .container{
        padding:18px 14px 30px;
      }

      h1{
        font-size:28px;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .price{
        font-size:24px;
      }

      .address{
        font-size:18px;
      }

      .summary-bar{
        align-items:flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="topbar-left">
        <div class="eyebrow">Change Realty</div>
        <h1>Listings</h1>
        <p class="subtitle">
          Browse available listings and click any property for full details, photos, and virtual tour links where available.
        </p>
      </div>

      <div class="top-actions">
        <a class="btn" href="/map">View Map</a>
        <a class="btn primary" href="/">Home</a>
      </div>
    </div>

    <div class="summary-bar">
      <div id="resultsSummary" class="summary-text">Loading listings…</div>
    </div>

    <div id="content">
      <div class="status">Loading listings…</div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script>
    const API_BASE = window.APP_CONFIG.API_BASE;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatPrice(listing) {
      const price = listing.list_price ?? listing.listPrice ?? listing.price ?? null;

      if (price === null || price === undefined || price === "") {
        return listing.is_lease ? "For Lease" : "Price on request";
      }

      const n = Number(price);
      if (Number.isNaN(n)) return String(price);

      return new Intl.NumberFormat("en-CA", {
        style: "currency",
        currency: "CAD",
        maximumFractionDigits: 0
      }).format(n);
    }

    function getRawObject(listing) {
      if (!listing || !listing.raw) return null;

      if (typeof listing.raw === "string") {
        try {
          return JSON.parse(listing.raw);
        } catch {
          return null;
        }
      }

      return listing.raw;
    }

    function getPhotoItems(listing) {
      const raw = getRawObject(listing);
      const media = raw?.Media || raw?.media;

      if (!Array.isArray(media)) return [];

      return media
        .filter(item => item && (item.MediaURL || item.mediaUrl))
        .filter(item => {
          const category = String(item.MediaCategory || item.mediaCategory || "").toLowerCase();
          return !category || category.includes("photo");
        })
        .sort((a, b) => {
          const aPreferred = a.PreferredPhotoYN ? 1 : 0;
          const bPreferred = b.PreferredPhotoYN ? 1 : 0;

          if (aPreferred !== bPreferred) {
            return bPreferred - aPreferred;
          }

          const aOrder = Number(a.Order ?? 999999);
          const bOrder = Number(b.Order ?? 999999);
          return aOrder - bOrder;
        });
    }

    function getPrimaryPhotoUrl(listing) {
      const photos = getPhotoItems(listing);
      if (photos.length) {
        return photos[0].MediaURL || photos[0].mediaUrl || null;
      }

      if (listing.photo) return listing.photo;
      if (listing.photo_url) return listing.photo_url;
      if (listing.thumbnail) return listing.thumbnail;

      return null;
    }

    function getAddress(listing) {
      return (
        listing.address_full ||
        listing.addressFull ||
        [listing.street_number, listing.street_name].filter(Boolean).join(" ") ||
        "Address unavailable"
      );
    }

    function getCityProvincePostal(listing) {
      return [listing.city, listing.province, listing.postal_code]
        .filter(Boolean)
        .join(", ");
    }

    function getBeds(listing) {
      return listing.bedrooms_total ?? listing.bedroomsTotal ?? "—";
    }

    function getBaths(listing) {
      return listing.bathrooms_total ?? listing.bathroomsTotal ?? "—";
    }

    function getRemarks(listing) {
      return listing.public_remarks || listing.publicRemarks || listing.remarks || "";
    }

    function getStatusLabel(listing) {
      const rawStatus = String(listing.status ?? "").trim().toLowerCase();

      if (!rawStatus) {
        return listing.is_lease ? "For Lease" : "For Sale";
      }

      if (rawStatus === "active") {
        return listing.is_lease ? "For Lease" : "For Sale";
      }

      return rawStatus;
    }

    function normalizeListingsResponse(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload.listings)) return payload.listings;
      if (Array.isArray(payload.results)) return payload.results;
      if (Array.isArray(payload.data)) return payload.data;
      if (Array.isArray(payload.items)) return payload.items;
      return [];
    }

    function renderListings(listings) {
      const content = document.getElementById("content");
      const resultsSummary = document.getElementById("resultsSummary");

      resultsSummary.textContent = `${listings.length} listing${listings.length === 1 ? "" : "s"} found`;

      if (!listings.length) {
        content.innerHTML = `
          <div class="empty-box">
            No listings available right now.
          </div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="grid">
          ${listings.map(listing => {
            const key = listing.listing_key ?? listing.listingKey ?? "";
            const price = formatPrice(listing);
            const address = getAddress(listing);
            const cityProvincePostal = getCityProvincePostal(listing);
            const beds = getBeds(listing);
            const baths = getBaths(listing);
            const remarks = getRemarks(listing);
            const mls = listing.mls_number ?? listing.mlsNumber ?? "—";
            const brokerage = listing.brokerage_name ?? listing.office_name ?? listing.officeName ?? "—";
            const statusLabel = getStatusLabel(listing);
            const photoUrl = getPrimaryPhotoUrl(listing);

            return `
              <a class="card-link" href="/listing.html?key=${encodeURIComponent(key)}">
                <article class="listing-card">
                  <div class="card-photo-wrap">
                    ${photoUrl ? `
                      <img
                        class="card-photo"
                        src="${escapeHtml(photoUrl)}"
                        alt="Photo for ${escapeHtml(address)}"
                        loading="lazy"
                      />
                    ` : `
                      <div class="no-photo">No photo available</div>
                    `}
                  </div>

                  <div class="card-body">
                    <div class="price-row">
                      <h2 class="price">${escapeHtml(price)}</h2>
                      <div class="status-pill">${escapeHtml(statusLabel)}</div>
                    </div>

                    <p class="address">${escapeHtml(address)}</p>
                    <p class="location">${escapeHtml(cityProvincePostal || "Location unavailable")}</p>

                    <div class="badges">
                      <div class="badge">${escapeHtml(String(beds))} Beds</div>
                      <div class="badge">${escapeHtml(String(baths))} Baths</div>
                      <div class="badge">MLS® ${escapeHtml(String(mls))}</div>
                    </div>

                    ${remarks ? `
                      <p class="remarks">${escapeHtml(remarks)}</p>
                    ` : ``}

                    <div class="meta">
                      <div class="brokerage">${escapeHtml(String(brokerage))}</div>
                      <div class="mls">View details</div>
                    </div>
                  </div>
                </article>
              </a>
            `;
          }).join("")}
        </div>
      `;
    }

    async function loadListings() {
      const content = document.getElementById("content");
      const resultsSummary = document.getElementById("resultsSummary");

      try {
        const resp = await fetch(`${API_BASE}/api/listings`);
        if (!resp.ok) {
          throw new Error(`API returned ${resp.status}`);
        }

        const payload = await resp.json();
        const listings = normalizeListingsResponse(payload);

        renderListings(listings);
      } catch (err) {
        console.error(err);
        resultsSummary.textContent = "Could not load listings";
        content.innerHTML = `
          <div class="error-box">
            Could not load listings right now.
          </div>
        `;
      }
    }

    loadListings();
  </script>
</body>
</html>
